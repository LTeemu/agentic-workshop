<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project sandbox workspace — run and preview web projects" />
    <title>Workshop</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-header">
          <button id="sidebar-toggle" aria-label="Toggle sidebar">◀</button>
          <h1>Workshop</h1>
        </div>
        <div id="sidebar-body">
          <div id="project-list"></div>
          <label id="auto-stop-label">
            <input type="checkbox" id="auto-stop" checked />
            <span class="toggle-track">
              <span class="toggle-knob"></span>
            </span>
            Auto-stop on switch
          </label>
          <button id="stop-all" class="sidebar-btn danger">Stop All</button>
        </div>
      </aside>
      <main id="main">
        <div id="placeholder">
          <h2>Select a project</h2>
          <p>Choose a project from the sidebar to preview it.</p>
        </div>
        <div id="preview" class="hidden">
          <div id="preview-header">
            <span id="project-name"></span>
            <span id="project-type"></span>
            <span id="project-status"></span>
            <span id="project-url"></span>
            <button id="open-tab">Open in Tab</button>
          </div>
          <div id="preview-frame-container">
            <div id="preview-notice" class="hidden">
              <span id="preview-notice-text"></span>
            </div>
            <iframe
              id="preview-frame"
              title="Project preview"
              sandbox="allow-scripts allow-same-origin allow-forms"
            ></iframe>
          </div>
        </div>
      </main>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
