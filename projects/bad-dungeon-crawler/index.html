<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050508" />
    <title>Relic — Dungeon ARPG</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="game-container">
      <div id="hud">
        <div class="hud-group">
          <span class="hud-label">Level</span>
          <span id="hud-level" class="hud-value">1</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-group">
          <span class="hud-label">HP</span>
          <span id="hud-hp" class="hud-value">20/20</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-group">
          <span class="hud-label">ATK</span>
          <span id="hud-atk" class="hud-value">2</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-group">
          <span class="hud-label">DEF</span>
          <span id="hud-def" class="hud-value">0</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-group">
          <span class="hud-label">Depth</span>
          <span id="hud-depth" class="hud-value">1</span>
        </div>
        <div class="hud-spacer"></div>
        <div id="hud-controls">WASD · SPACE · E · I · R</div>
      </div>

      <canvas id="game-canvas"></canvas>

      <div id="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move
        <span class="hint-sep">·</span>
        <kbd>SPACE</kbd> dodge roll
        <span class="hint-sep">·</span>
        <kbd>E</kbd> pickup
        <span class="hint-sep">·</span>
        <kbd>I</kbd> inventory
        <span class="hint-sep">·</span>
        <kbd>R</kbd> restart
      </div>
    </div>

    <div id="grain"></div>

    <script type="module" src="/game/main.js"></script>
  </body>
</html>
